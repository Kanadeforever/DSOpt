[CrashFix]
; 0=disabled, 1-8=limit to N cores, invalid defaults to 4
CoreLimit=4

[Window]
; PerMonitor DPI awareness (fixes coordinates on HiDPI)
DPIAware=1
; Borderless fullscreen mode (toggleable via ToggleKey)
Borderless=1
; Auto-center window on startup and resolution change
CenterWindow=1
; Keep window on top
AlwaysOnTop=0
; Hotkey to toggle borderless (VK code, 0=disabled, F10=121)
ToggleKey=121
; Window tasks poll interval in milliseconds (min 500, default 1000)
; Controls: centering, borderless re-apply, font scale detection
; Hotkey polling is fixed at 50ms and is not affected
PollInterval=1000

[Subtitle]
; 0 = auto (game window height / BaseHeight, fallback to screen height)
; Set manually e.g. 1.5 for 1080p, 3.0 for 4K
Scale=0
; Reference design resolution height for auto-scale (default 720)
BaseHeight=720

[Debug]
; Write diagnostic log to DSOpt.log in the ASI directory (0=off, 1=on)
Log=0
